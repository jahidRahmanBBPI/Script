     <!-- 45 DOM Manipulate CSS Class -->
     <h1 id="MyId" class="">Bangladesh</h1>
     <button class="btn btn-outline-primary" onclick="AddStyle()">Add</button>
     <button class="btn btn-outline-danger" onclick="RemoveStyle()">Remove</button>

     <script>
        function AddStyle(){
            let H1Tag= document.getElementById('MyId')
            H1Tag.classList.add('text-primary')
        }
        function RemoveStyle(){
            let H1Tag= document.getElementById('MyId')
            H1Tag.classList.remove('text-primary')
        }
